<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 光影集</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="css/style.css?v=20260518" />
<script src="js/shared.js?v=20260518" nonce="__CSP_NONCE__"></script>
<style>
  .admin-layout { display: flex; min-height: 100vh; }
  .admin-sidebar {
    width: 210px; flex-shrink: 0; background: var(--bg-elevated);
    border-right: 1px solid var(--border); padding: 16px 0;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .admin-sidebar h3 { padding: 0 16px 10px; font-size: .72rem; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
  .admin-nav a {
    display: flex; align-items: center; gap: 8px; padding: 9px 16px;
    font-size: .82rem; color: var(--text-secondary); transition: all .15s;
    border-left: 2px solid transparent;
  }
  .admin-nav a:hover, .admin-nav a.active { color: var(--text); background: rgba(255,255,255,.03); border-left-color: var(--accent); }
  .admin-main { flex: 1; padding: 24px 28px; overflow-y: auto; max-height: 100vh; }
  .admin-main h2 { font-size: 1.2rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .section { display: none; }
  .section.active { display: block; animation: fadeUp .3s var(--ease-smooth); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .stat-card {
    padding: 16px; border-radius: var(--radius); background: var(--bg-elevated);
    border: 1px solid var(--border); transition: var(--transition);
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-card .num { font-size: 1.7rem; font-weight: 800; color: var(--accent); }
  .stat-card .lbl { font-size: .74rem; color: var(--text-muted); margin-top: 2px; }
  .stat-card.warn .num { color: #facc15; }
  .stat-card.danger .num { color: #f87171; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .data-table th { text-align: left; padding: 9px 10px; color: var(--text-muted); font-weight: 600; font-size: .72rem; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,.02); vertical-align: middle; }
  .data-table tr:hover td { background: rgba(255,255,255,.01); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .7rem; font-weight: 600; }
  .badge-green { background: rgba(34,197,94,.15); color: #4ade80; }
  .badge-yellow { background: rgba(234,179,8,.15); color: #facc15; }
  .badge-red { background: rgba(239,68,68,.15); color: #f87171; }
  .badge-purple { background: rgba(168,85,247,.15); color: #a78bfa; }

  /* Toolbar */
  .admin-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .admin-toolbar input { padding: 7px 12px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: .8rem; outline: none; }
  .admin-toolbar input:focus { border-color: var(--accent); }

  /* Banner grid */
  .banner-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .banner-card {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; transition: var(--transition);
  }
  .banner-card:hover { border-color: var(--accent); }
  .banner-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
  .banner-card .bc-body { padding: 10px 12px; }
  .banner-card .bc-body .t { font-size: .82rem; font-weight: 600; }
  .banner-card .bc-body .m { font-size: .7rem; color: var(--text-muted); margin-top: 2px; }

  /* Charts placeholder */
  .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 20px; }
  .chart-box {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; min-height: 200px;
  }
  .chart-box h3 { font-size: .85rem; color: var(--text-muted); margin-bottom: 12px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 140px; }
  .bar-item { flex: 1; text-align: center; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 2px; transition: height .5s var(--ease-smooth); }
  .bar-label { font-size: .65rem; color: var(--text-muted); margin-top: 4px; }
  .bar-value { font-size: .72rem; font-weight: 700; color: var(--text); }

  .log-entry { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .78rem; display: flex; gap: 10px; }
  .log-entry .log-time { color: var(--text-muted); font-size: .7rem; white-space: nowrap; }
  .log-entry .log-action { font-weight: 600; min-width: 80px; }
  .log-entry .log-detail { color: var(--text-secondary); }

  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
  .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: .8rem; margin-bottom: 10px; animation: fadeUp .3s var(--ease-smooth); }
  .alert-ok { background: rgba(34,197,94,.1); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
  .alert-err { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); }

  @media (max-width: 700px) {
    .admin-sidebar { width: 160px; }
    .admin-main { padding: 16px; }
    .chart-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="/" class="logo" style="padding:0 16px 16px;">
      <svg width="20" height="20" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#lga)"/><path d="M6 20V8l7 8 3-4 3 4 3-6v10H6z" fill="white" opacity="0.9"/><defs><linearGradient id="lga" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs></svg>
      <span>光影集</span>
    </a>
    <h3>管理后台</h3>
    <nav class="admin-nav">
      <a href="#" class="active" data-section="dashboard">📊 仪表盘</a>
      <a href="#" data-section="photos">🖼️ 内容管理</a>
      <a href="#" data-section="banners">🎯 Banner</a>
      <a href="#" data-section="albums">📁 分类管理</a>
      <a href="#" data-section="users">👥 用户管理</a>
      <a href="#" data-section="logs">📋 操作日志</a>
      <a href="/" style="margin-top:10px;opacity:.5">← 返回前台</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div id="alertBox"></div>

    <!-- Dashboard -->
    <section class="section active" id="sec-dashboard">
      <h2>📊 仪表盘</h2>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="chart-row">
        <div class="chart-box">
          <h3>📈 今日数据</h3>
          <div class="bar-chart" id="barChart"></div>
        </div>
        <div class="chart-box">
          <h3>🕐 最近操作</h3>
          <div id="recentLogs"></div>
        </div>
      </div>
    </section>

    <!-- Photos -->
    <section class="section" id="sec-photos">
      <h2>🖼️ 内容管理</h2>
      <div class="admin-toolbar">
        <button class="sort-chip active" data-status="all">全部</button>
        <button class="sort-chip" data-status="pending">⏳ 待审核</button>
        <button class="sort-chip" data-status="approved">✅ 已通过</button>
        <button class="sort-chip" data-status="rejected">❌ 已拒绝</button>
        <input type="text" id="photoSearch" placeholder="搜索标题..." style="margin-left:auto" />
      </div>
      <div id="photosTable"></div>
    </section>

    <!-- Banners -->
    <section class="section" id="sec-banners">
      <h2>🎯 Banner 管理</h2>
      <div class="admin-toolbar">
        <button class="btn-primary btn-sm" id="addBannerBtn">＋ 添加 Banner</button>
      </div>
      <div class="banner-grid" id="bannerGrid"></div>
      <!-- Add/Edit form -->
      <div id="bannerForm" style="display:none;margin-top:16px;padding:16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;gap:10px;max-width:500px">
        <input type="text" id="bannerTitle" class="input-glass" placeholder="Banner 标题" />
        <input type="text" id="bannerImage" class="input-glass" placeholder="图片 URL（必填）" />
        <input type="text" id="bannerLink" class="input-glass" placeholder="链接地址（可选）" />
        <div style="display:flex;gap:8px">
          <button class="btn-primary btn-sm" id="bannerSave">保存</button>
          <button class="btn-glass btn-sm" id="bannerCancel">取消</button>
        </div>
        <input type="hidden" id="bannerEditId" />
      </div>
    </section>

    <!-- Albums -->
    <section class="section" id="sec-albums">
      <h2>📁 分类管理</h2>
      <div class="admin-toolbar">
        <input type="text" id="newAlbumName" placeholder="分类名称" />
        <input type="text" id="newAlbumDesc" placeholder="分类描述（可选）" style="width:240px" />
        <button class="btn-primary btn-sm" id="addAlbumBtn">＋ 添加</button>
      </div>
      <div id="albumsTable"></div>
    </section>

    <!-- Users -->
    <section class="section" id="sec-users">
      <h2>👥 用户管理</h2>
      <div class="admin-toolbar">
        <input type="text" id="userSearch" placeholder="搜索用户名或邮箱..." />
      </div>
      <div id="usersTable"></div>
    </section>

    <!-- Logs -->
    <section class="section" id="sec-logs">
      <h2>📋 操作日志</h2>
      <div id="logsTable"></div>
    </section>
  </main>
</div>

<script src="js/admin.js?v=20260518" nonce="__CSP_NONCE__"></script>
</body>
</html>
