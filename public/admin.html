<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 光影集</title>
<link rel="stylesheet" href="css/style.css" />
<style>
  .admin-layout { display: flex; min-height: 100vh; }
  .admin-sidebar {
    width: 220px; flex-shrink: 0; background: var(--bg-elevated);
    border-right: 1px solid var(--border); padding: 20px 0;
  }
  .admin-sidebar h3 { padding: 0 20px 16px; font-size: .8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; }
  .admin-nav a {
    display: flex; align-items: center; gap: 8px; padding: 10px 20px;
    font-size: .85rem; color: var(--text-secondary); transition: all .15s;
    border-left: 2px solid transparent;
  }
  .admin-nav a:hover, .admin-nav a.active { color: var(--text); background: rgba(255,255,255,.03); border-left-color: var(--accent); }
  .admin-main { flex: 1; padding: 28px 32px; overflow-y: auto; max-height: 100vh; }
  .admin-main h2 { font-size: 1.3rem; margin-bottom: 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    padding: 18px; border-radius: var(--radius); background: var(--bg-elevated);
    border: 1px solid var(--border);
  }
  .stat-card .num { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
  .stat-card .lbl { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
  .data-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
  .data-table th { text-align: left; padding: 10px 12px; color: var(--text-muted); font-weight: 600; font-size: .74rem; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.02); }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: .7rem; font-weight: 600; }
  .badge-approved { background: rgba(34,197,94,.15); color: #4ade80; }
  .badge-pending { background: rgba(234,179,8,.15); color: #facc15; }
  .badge-rejected { background: rgba(239,68,68,.15); color: #f87171; }
  .badge-admin { background: rgba(168,85,247,.15); color: #a78bfa; }
  .badge-user { background: rgba(100,116,139,.15); color: #94a3b8; }
  .btn-sm { padding: 5px 12px; font-size: .74rem; border-radius: var(--radius-sm); }
  .section { display: none; }
  .section.active { display: block; }
  .empty-admin { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: .82rem; margin-bottom: 12px; }
  .alert-err { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
  .alert-ok { background: rgba(34,197,94,.1); color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="/" class="logo" style="padding:0 20px 20px;">
      <svg width="22" height="22" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#lg)"/><path d="M6 20V8l7 8 3-4 3 4 3-6v10H6z" fill="white" opacity="0.9"/><defs><linearGradient id="lg" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs></svg>
      <span>光影集</span>
    </a>
    <h3>管理后台</h3>
    <nav class="admin-nav">
      <a href="#" class="active" data-section="dashboard">📊 仪表盘</a>
      <a href="#" data-section="photos">🖼️ 图片审核</a>
      <a href="#" data-section="albums">📁 分类管理</a>
      <a href="#" data-section="users">👥 用户管理</a>
      <a href="/">← 返回前台</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div id="alertBox"></div>

    <!-- Dashboard -->
    <section class="section active" id="sec-dashboard">
      <h2>仪表盘</h2>
      <div class="stats-grid" id="statsGrid"></div>
    </section>

    <!-- Photos Review -->
    <section class="section" id="sec-photos">
      <h2>图片审核</h2>
      <div style="display:flex;gap:6px;margin-bottom:16px">
        <button class="sort-chip active" data-status="all">全部</button>
        <button class="sort-chip" data-status="pending">⏳ 待审核</button>
        <button class="sort-chip" data-status="approved">✅ 已通过</button>
        <button class="sort-chip" data-status="rejected">❌ 已拒绝</button>
      </div>
      <div id="photosTable"></div>
    </section>

    <!-- Albums -->
    <section class="section" id="sec-albums">
      <h2>分类管理</h2>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input type="text" id="newAlbumName" placeholder="分类名称" class="input-glass" style="width:200px" />
        <button class="btn-primary btn-sm" id="addAlbumBtn">＋ 添加</button>
      </div>
      <div id="albumsTable"></div>
    </section>

    <!-- Users -->
    <section class="section" id="sec-users">
      <h2>用户管理</h2>
      <div id="usersTable"></div>
    </section>
  </main>
</div>

<script>
const TOKEN = localStorage.getItem('wp_token');
if (!TOKEN) window.location.href = '/login.html';

const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN };
const $ = (s) => document.getElementById(s);
const alertBox = $('alertBox');
let currentPhotoStatus = 'all';

function alert(msg, ok) {
  alertBox.innerHTML = `<div class="alert ${ok ? 'alert-ok' : 'alert-err'}">${msg}</div>`;
  setTimeout(() => alertBox.innerHTML = '', 3000);
}

async function api(url, opts = {}) {
  const res = await fetch(url, { headers, ...opts });
  if (res.status === 401) { localStorage.clear(); window.location.href = '/login.html'; return; }
  if (res.status === 403) { alert('无管理员权限', false); return; }
  const data = await res.json();
  if (!res.ok) { alert(data.error, false); throw new Error(data.error); }
  return data;
}

// Navigation
document.querySelectorAll('.admin-nav a[data-section]').forEach(a => {
  a.addEventListener('click', (e) => {
    e.preventDefault();
    document.querySelectorAll('.admin-nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + a.dataset.section).classList.add('active');
    if (a.dataset.section === 'dashboard') loadDashboard();
    if (a.dataset.section === 'photos') loadPhotos();
    if (a.dataset.section === 'albums') loadAlbums();
    if (a.dataset.section === 'users') loadUsers();
  });
});

// Dashboard
async function loadDashboard() {
  const stats = await api('/api/admin/stats');
  if (!stats) return;
  $('statsGrid').innerHTML = [
    { n: stats.photos, l: '壁纸总数' },
    { n: stats.videos, l: '动态壁纸' },
    { n: stats.pending, l: '待审核' },
    { n: stats.users, l: '用户数' },
    { n: stats.downloads, l: '总下载' },
    { n: stats.albums, l: '分类数' },
  ].map(s => `<div class="stat-card"><div class="num">${s.n}</div><div class="lbl">${s.l}</div></div>`).join('');
}

// Photos
async function loadPhotos() {
  const data = await api(`/api/admin/photos?status=${currentPhotoStatus === 'all' ? '' : currentPhotoStatus}&per_page=50`);
  if (!data) return;
  $('photosTable').innerHTML = data.photos.length === 0
    ? '<div class="empty-admin">暂无数据</div>'
    : `<table class="data-table"><thead><tr><th>ID</th><th>预览</th><th>标题</th><th>类型</th><th>状态</th><th>上传者</th><th>操作</th></tr></thead><tbody>
      ${data.photos.map(p => `
        <tr>
          <td>${p.id}</td>
          <td><img src="/uploads/${p.filename}" style="width:60px;height:40px;object-fit:cover;border-radius:4px" /></td>
          <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title || p.original_name}</td>
          <td>${p.media_type === 'video' ? '🎬 视频' : '🖼️ 图片'}</td>
          <td><span class="badge badge-${p.status}">${p.status === 'approved' ? '已通过' : p.status === 'pending' ? '待审核' : '已拒绝'}</span></td>
          <td>${p.uploader_name || '—'}</td>
          <td>
            ${p.status !== 'approved' ? `<button class="btn-primary btn-sm" onclick="review(${p.id},'approved')" style="margin-right:4px">通过</button>` : ''}
            ${p.status !== 'rejected' ? `<button class="btn-glass btn-sm" onclick="review(${p.id},'rejected')" style="margin-right:4px">拒绝</button>` : ''}
            <button class="btn-glass btn-sm" onclick="delPhoto(${p.id})" style="color:#f87171">删除</button>
          </td>
        </tr>
      `).join('')}
      </tbody></table>`;

  // Status filter chips
  document.querySelectorAll('#sec-photos [data-status]').forEach(chip => {
    chip.onclick = () => {
      document.querySelectorAll('#sec-photos [data-status]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentPhotoStatus = chip.dataset.status;
      loadPhotos();
    };
  });
}

window.review = async (id, status) => { await api(`/api/admin/photos/${id}/review`, { method: 'PATCH', body: JSON.stringify({ status }) }); loadPhotos(); loadDashboard(); };
window.delPhoto = async (id) => { if (!confirm('确定删除？')) return; await api(`/api/admin/photos/${id}`, { method: 'DELETE' }); loadPhotos(); loadDashboard(); };

// Albums
async function loadAlbums() {
  const data = await api('/api/albums');
  if (!data) return;
  $('albumsTable').innerHTML = `<table class="data-table"><thead><tr><th>名称</th><th>标识</th><th>图片数</th><th>操作</th></tr></thead><tbody>
    ${data.map(a => `<tr><td>${a.name}</td><td>${a.slug}</td><td>${a.photo_count}</td><td><button class="btn-glass btn-sm" onclick="delAlbum(${a.id})" style="color:#f87171">删除</button></td></tr>`).join('')}
  </tbody></table>`;
}

$('addAlbumBtn').addEventListener('click', async () => {
  const name = $('newAlbumName').value.trim();
  if (!name) return alert('请输入分类名', false);
  await api('/api/admin/albums', { method: 'POST', body: JSON.stringify({ name }) });
  $('newAlbumName').value = '';
  loadAlbums();
  loadDashboard();
});

window.delAlbum = async (id) => {
  if (!confirm('删除分类后，该分类下的图片将变为未分类。确定？')) return;
  await api(`/api/admin/albums/${id}`, { method: 'DELETE' });
  loadAlbums();
  loadDashboard();
};

// Users
async function loadUsers() {
  const data = await api('/api/admin/users?per_page=100');
  if (!data) return;
  $('usersTable').innerHTML = `<table class="data-table"><thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>上传数</th><th>注册时间</th><th>操作</th></tr></thead><tbody>
    ${data.users.map(u => `
      <tr>
        <td>${u.id}</td><td>${u.username}</td><td>${u.email}</td>
        <td><span class="badge badge-${u.role}">${u.role === 'admin' ? '管理员' : '用户'}</span></td>
        <td>${u.photo_count}</td><td>${u.created_at ? u.created_at.slice(0,10) : '—'}</td>
        <td>
          <button class="btn-glass btn-sm" onclick="toggleRole(${u.id},'${u.role}')">${u.role === 'admin' ? '降为普通' : '升为管理员'}</button>
          ${u.role !== 'admin' ? `<button class="btn-glass btn-sm" onclick="delUser(${u.id})" style="color:#f87171;margin-left:4px">删除</button>` : ''}
        </td>
      </tr>
    `).join('')}
  </tbody></table>`;
}

window.toggleRole = async (id, current) => {
  const next = current === 'admin' ? 'user' : 'admin';
  await api(`/api/admin/users/${id}/role`, { method: 'PATCH', body: JSON.stringify({ role: next }) });
  loadUsers();
};

window.delUser = async (id) => {
  if (!confirm('确定删除该用户？')) return;
  await api(`/api/admin/users/${id}`, { method: 'DELETE' });
  loadUsers();
  loadDashboard();
};

// Init
loadDashboard();
</script>
</body>
</html>
