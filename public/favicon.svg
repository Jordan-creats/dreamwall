<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="12" y="12" width="104" height="104" rx="26" fill="url(#bg)"/>

  <!-- Polaroid frame -->
  <rect x="24" y="18" width="80" height="68" rx="10" fill="#fff" stroke="#fce7f3" stroke-width="2"/>
  <rect x="28" y="22" width="56" height="48" rx="6" fill="#fdf2f8"/>

  <!-- Cute mountain/sun scene in polaroid -->
  <circle cx="48" cy="36" r="8" fill="#fbbf24" opacity=".8"/>
  <!-- Little clouds -->
  <ellipse cx="60" cy="34" rx="7" ry="4" fill="#e0e7ff"/>
  <ellipse cx="64" cy="32" rx="5" ry="3.5" fill="#c7d2fe"/>
  <!-- Cute mountains -->
  <polygon points="36,62 48,44 54,50 60,42 72,62" fill="#c084fc" opacity=".7"/>
  <polygon points="42,62 52,50 56,54 60,48 68,62" fill="#a78bfa" opacity=".5"/>

  <!-- Sparkles -->
  <g fill="#fbbf24">
    <circle cx="78" cy="40" r="2.5"/>
    <circle cx="82" cy="50" r="1.8"/>
    <circle cx="76" cy="55" r="2"/>
  </g>
  <g fill="#f9a8d4">
    <circle cx="30" cy="58" r="1.5"/>
    <circle cx="72" cy="30" r="1.5"/>
  </g>

  <!-- Bottom action bar of polaroid -->
  <rect x="36" y="76" width="40" height="4" rx="2" fill="#e0e7ff"/>

  <!-- Blush cheeks on the polaroid frame -->
  <ellipse cx="34" cy="56" rx="5" ry="3.5" fill="#fecdd3" opacity=".6"/>
  <ellipse cx="70" cy="56" rx="5" ry="3.5" fill="#fecdd3" opacity=".6"/>

  <!-- Tiny heart -->
  <path d="M92 94c0-3 2.5-5.5 5.5-5.5 1.8 0 3.3.8 4.3 2 1-1.2 2.5-2 4.3-2 3 0 5.5 2.5 5.5 5.5 0 4-5 8.5-9.8 12-4.8-3.5-9.8-8-9.8-12z" fill="#f472b6"/>

  <!-- Glossy shine overlay -->
  <rect x="12" y="12" width="104" height="104" rx="26" fill="url(#shine)" opacity=".3"/>
</svg>
