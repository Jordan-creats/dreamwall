<div class="modal" id="modal">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-container">
    <button class="modal-close" id="modalClose">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>

    </button>
    <div class="modal-body">

        <img src="" alt="" id="modalImg" />
        <video id="modalVideo" loop muted playsinline autoplay style="display:none">
          <source src="" type="video/mp4" />
        </video>
      </div>
      <aside class="modal-sidebar">
        <div class="modal-sidebar-content">
          <div class="modal-badge" id="modalBadge"></div>
          <h2 class="modal-title" contenteditable="true" id="modalTitle"></h2>

          <div class="modal-info">

            <div class="info-row"><span class="info-label">分辨率</span><span class="info-value" id="infoRes">—</span></div>
            <div class="info-row"><span class="info-label">文件大小</span><span class="info-value" id="infoSize">—</span></div>
            <div class="info-row" id="infoDurationRow" style="display:none"><span class="info-label">时长</span><span class="info-value" id="infoDuration">—</span></div>
            <div class="info-row"><span class="info-label">下载次数</span><span class="info-value" id="infoDownloads">—</span></div>
            <div class="info-row"><span class="info-label">上传日期</span><span class="info-value" id="infoDate">—</span></div>
            <div class="info-row"><span class="info-label">分类</span><span class="info-value" id="infoAlbum">—</span></div>
          </div>
          <div class="modal-actions">
            <a class="btn-primary btn-full" id="modalDownload" href="#" download>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>

            <button class="btn-glass btn-full play-toggle" id="modalPlayToggle" style="display:none">

            </button>

    <div class="modal-counter" id="modalCounter"></div>

<!-- ════════════════════════════════════

<div class="upload-overlay" id="uploadOverlay">
