<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>热门排行 · 光影集</title>
<meta name="description" content="光影集热门壁纸排行 — 下载量最高的高清壁纸与动态壁纸" />

<style>
  .popular-page { min-height: 100vh; background: var(--bg); }
  .popular-hero {
    text-align: center; padding: 60px 24px 40px;
    background: linear-gradient(180deg, rgba(168,85,247,.06) 0%, transparent 100%);
  }
  .popular-hero h1 { font-size: 2rem; font-weight: 800; }
  .popular-hero p { color: var(--text-muted); margin-top: 6px; }
  .popular-tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 32px; }
  .rank-list { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }
  .rank-item {
    display: flex; align-items: center; gap: 16px; padding: 14px 16px;
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 8px;
    cursor: pointer; transition: var(--transition);
  }
  .rank-item:hover { border-color: var(--accent); transform: translateX(2px); box-shadow: var(--shadow); }
  .rank-num {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: .9rem;
    background: var(--bg-glass); border: 1px solid var(--border);
  }
  .rank-item:nth-child(1) .rank-num { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; border-color: transparent; }
  .rank-item:nth-child(2) .rank-num { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; border-color: transparent; }
  .rank-item:nth-child(3) .rank-num { background: linear-gradient(135deg, #d97706, #92400e); color: #fff; border-color: transparent; }
  .rank-thumb { width: 100px; height: 62px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-info h3 { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-info .meta { font-size: .74rem; color: var(--text-muted); margin-top: 2px; }
  .rank-stats { text-align: right; flex-shrink: 0; }
  .rank-stats .dl { font-size: .95rem; font-weight: 700; color: var(--accent); }
  .rank-stats .lbl { font-size: .68rem; color: var(--text-muted); }
  @media (max-width: 600px) {
    .rank-thumb { width: 60px; height: 40px; }
    .rank-stats { display: none; }
  }
</style>
</head>
<body class="popular-page">

<header class="header">
  <div class="header-inner">

      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#lgg)"/><path d="M6 20V8l7 8 3-4 3 4 3-6v10H6z" fill="white" opacity="0.9"/><defs><linearGradient id="lgg" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#6366f1"/></linearGradient></defs></svg>
      <span>光影集</span>
    </a>
    <div class="header-actions">
      <a href="/" class="btn-glass">← 返回</a>
    </div>
  </div>
</header>

<section class="popular-hero">
  <h1>🔥 热门排行</h1>
  <p>下载量最高的壁纸 Top 50</p>
</section>

<div class="popular-tabs">
  <button class="sort-chip active" data-period="all">总榜</button>
  <button class="sort-chip" data-period="month">本月</button>
  <button class="sort-chip" data-period="week">本周</button>
</div>

<div class="rank-list" id="rankList"></div>

<script src="js/popular.js?v=20260518" nonce="__CSP_NONCE__"></script>
</body>
</html>
