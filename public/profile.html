<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页 · 光影集</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="css/style.css?v=20260518" />
<script src="js/shared.js?v=20260518" nonce="__CSP_NONCE__"></script>
<style>
  .profile-page { min-height: 100vh; background: var(--bg); }
  .profile-cover { height: 160px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); position: relative; }
  .profile-header { max-width: 800px; margin: -50px auto 0; padding: 0 24px; position: relative; z-index: 1; display: flex; align-items: flex-end; gap: 20px; }
  .profile-avatar {
    width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--bg);
    background: var(--bg-elevated); display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; font-weight: 700; color: var(--accent); flex-shrink: 0;
  }
  .profile-info { flex: 1; padding-bottom: 4px; }
  .profile-info h1 { font-size: 1.4rem; font-weight: 800; }
  .profile-info .role { font-size: .76rem; color: var(--text-muted); }
  .profile-stats { display: flex; gap: 20px; margin-top: 8px; }
  .profile-stats .ps { text-align: center; }
  .profile-stats .ps .n { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .profile-stats .ps .l { font-size: .7rem; color: var(--text-muted); }
  .profile-body { max-width: 800px; margin: 28px auto; padding: 0 24px 80px; }
  .profile-body h2 { font-size: 1.05rem; margin-bottom: 16px; }
  .profile-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .profile-card {
    border-radius: var(--radius); overflow: hidden;
    background: var(--bg-elevated); border: 1px solid var(--border);
    transition: var(--transition); cursor: pointer;
  }
  .profile-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .profile-card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; }
  .profile-card .pc-body { padding: 8px 10px; font-size: .78rem; }
  .profile-card .pc-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .profile-card .pc-meta { color: var(--text-muted); font-size: .7rem; margin-top: 2px; }
  .profile-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .empty-profile { text-align: center; padding: 40px; color: var(--text-muted); }
  .back-link { display: inline-flex; align-items: center; gap: 4px; color: var(--text-muted); font-size: .82rem; margin-bottom: 12px; }
</style>
</head>
<body class="profile-page">

<div class="profile-cover"></div>

<div class="profile-header">
  <div class="profile-avatar" id="profileAvatar">?</div>
  <div class="profile-info">
    <a href="/" class="back-link">← 返回首页</a>
    <h1 id="profileName">加载中...</h1>
    <div class="role" id="profileRole"></div>
    <div class="profile-stats">
      <div class="ps"><div class="n" id="statUploads">0</div><div class="l">上传</div></div>
      <div class="ps"><div class="n" id="statFavs">0</div><div class="l">收藏</div></div>
      <div class="ps"><div class="n" id="statDls">0</div><div class="l">下载</div></div>
    </div>
  </div>
</div>

<div class="profile-body">
  <div class="profile-tabs">
    <button class="sort-chip active" data-tab="uploads">上传的壁纸</button>
    <button class="sort-chip" data-tab="favorites">收藏的壁纸</button>
  </div>
  <div class="profile-grid" id="profileGrid"></div>
</div>

<script src="js/profile.js?v=20260518" nonce="__CSP_NONCE__"></script>
</body>
</html>
