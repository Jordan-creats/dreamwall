version: '3.8'

services:
  app:
    build: .
    container_name: wp-gallery
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=3000

  # Optional: Add nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: wp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/usr/share/nginx/uploads:ro
    depends_on:
      - app
    profiles:
      - production
